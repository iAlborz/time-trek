<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrek - Projects</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css?v=12">
</head>
<body class="projects-page">
    <div class="projects-container">
        <header class="projects-header">
            <!-- Decorative: the <h1> below carries the accessible name -->
            <svg class="logo-mark" viewBox="0 0 92 42" aria-hidden="true" focusable="false">
                <g fill="none" stroke-linecap="round" stroke-width="2">
                    <line x1="45" y1="2" x2="45" y2="40" stroke="var(--color-ink)" stroke-width="1.8"/>
                    <line x1="13" y1="11.5" x2="42.5" y2="11.5" stroke="var(--color-secondary)"/>
                    <line x1="48" y1="11.5" x2="70" y2="11.5" stroke="var(--color-secondary)"/>
                    <line x1="10.5" y1="20.5" x2="41" y2="20.5" stroke="var(--color-brand)"/>
                    <line x1="49.5" y1="20.5" x2="88" y2="20.5" stroke="var(--color-brand)"/>
                    <line x1="2" y1="28.5" x2="42.5" y2="28.5" stroke="var(--color-amber)"/>
                    <line x1="48" y1="28.5" x2="70.5" y2="28.5" stroke="var(--color-amber)"/>
                </g>
                <g stroke="none">
                    <circle cx="9" cy="11.5" r="1.1" fill="var(--color-secondary)"/>
                    <circle cx="71" cy="11.5" r="1.9" fill="var(--color-secondary)"/>
                    <circle cx="89" cy="20.5" r="2.3" fill="var(--color-brand)"/>
                    <circle cx="72" cy="28.5" r="1.9" fill="var(--color-amber)"/>
                    <circle cx="45" cy="20.5" r="3.3" fill="var(--color-ink)"/>
                </g>
            </svg>
            <h1 class="projects-title">TimeTrek</h1>
            <p class="projects-subtitle">Your timelines, organized.</p>
        </header>

        <div class="projects-actions">
            <button id="new-project-btn" class="data-button">
                <svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path d="M8 3.5v9M3.5 8h9"/>
                </svg>
                New Project
            </button>
            <button id="import-project-btn" class="data-button">
                <svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path d="M8 10.5V2.5"/>
                    <path d="M4.8 5.7 8 2.5l3.2 3.2"/>
                    <path d="M2.5 10.5V12a1.5 1.5 0 0 0 1.5 1.5h8a1.5 1.5 0 0 0 1.5-1.5v-1.5"/>
                </svg>
                Import JSON
            </button>
            <input type="file" id="json-import" accept=".json" style="display: none;">
        </div>

        <div class="projects-sample-actions">
            <button id="open-sample-btn" class="subtle-button">Open Sample Project</button>
            <button id="download-sample-btn" class="subtle-button">Download sample project</button>
        </div>

        <div id="project-grid" class="project-grid"></div>

        <div id="empty-state" class="projects-empty" style="display: none;">
            <p>No projects yet. Create one or import a .timetrek.json file to get started.</p>
        </div>
    </div>

    <!-- New Project Modal -->
    <div id="new-project-modal" class="edit-modal">
        <div class="edit-modal-content">
            <h3 class="edit-modal-title">New Project</h3>
            <label class="edit-label">Project Name
                <input type="text" id="new-project-name" class="edit-input" placeholder="My Timeline">
            </label>
            <label class="edit-label">Description (optional)
                <textarea id="new-project-desc" class="edit-input edit-textarea" rows="2" placeholder="A brief description..."></textarea>
            </label>
            <div class="edit-modal-buttons">
                <button id="new-project-cancel" class="edit-btn edit-btn-cancel">Cancel</button>
                <button id="new-project-create" class="edit-btn edit-btn-save">Create</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/projects-main.js"></script>
</body>
</html>
