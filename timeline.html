<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrek - Interactive Timeline</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css?v=25">
</head>
<body class="timeline-page">
    <div class="container">
        <canvas id="timeline-canvas"></canvas>
        <div id="timeline-items" class="tl-items"></div>

        <input type="file" id="csv-upload" accept=".csv" style="display: none;">
        <input type="file" id="json-upload" accept=".json" style="display: none;">

        <div class="top-controls top-controls--left">
            <a href="index.html" id="back-btn" class="btn btn--quiet">
                <svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path d="M12.5 8h-9"/>
                    <path d="M7 3.5 2.5 8 7 12.5"/>
                </svg>
                Projects
            </a>
            <div class="data-menu" id="data-menu">
                <button id="data-menu-btn" class="btn btn--quiet"
                        aria-haspopup="true" aria-expanded="false" aria-controls="data-menu-panel">
                    Data
                    <svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                        <path d="M4 6.5 8 10.5l4-4"/>
                    </svg>
                </button>
                <div class="menu data-menu-panel" id="data-menu-panel" role="menu">
                    <button id="upload-btn" class="menu-item" role="menuitem">Import CSV</button>
                    <button id="import-json-btn" class="menu-item" role="menuitem">Import JSON</button>
                    <button id="export-btn" class="menu-item" role="menuitem">Export JSON</button>
                    <button id="sample-data-btn" class="menu-item" role="menuitem">Load Sample Data</button>
                    <hr class="menu-separator">
                    <button id="clear-data-btn" class="menu-item menu-item--danger" role="menuitem">Clear Data</button>
                </div>
            </div>
        </div>

        <div class="top-controls top-controls--right">
            <button id="add-item-btn" class="btn btn--primary">
                <svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path d="M8 3.5v9M3.5 8h9"/>
                </svg>
                Add Item
            </button>
            <button id="today-btn" class="btn btn--primary">Today</button>
        </div>

        <div class="menu item-menu" id="item-menu" role="menu" hidden>
            <button class="menu-item" role="menuitem" data-item-action="edit">Edit</button>
            <button class="menu-item" role="menuitem" data-item-action="fit">Zoom to fit</button>
            <button class="menu-item" role="menuitem" data-item-action="expand">Open all children</button>
        </div>

        <p class="timeline-readout" id="timeline-readout"></p>

        <div class="scale-controls">
            <button id="fit-btn" class="btn btn--quiet">
                <svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path d="M6 2.5H2.5V6"/>
                    <path d="M10 2.5h3.5V6"/>
                    <path d="M6 13.5H2.5V10"/>
                    <path d="M10 13.5h3.5V10"/>
                </svg>
                Fit All
            </button>
            <span class="scale-divider" aria-hidden="true"></span>
            <button class="btn btn--quiet" data-scale="hour">Hour</button>
            <button class="btn btn--quiet" data-scale="day">Day</button>
            <button class="btn btn--quiet" data-scale="week">Week</button>
            <button class="btn btn--quiet" data-scale="month">Month</button>
            <button class="btn btn--quiet" data-scale="quarter">Quarter</button>
            <button class="btn btn--quiet" data-scale="year">Year</button>
            <button class="btn btn--quiet" data-scale="decade">Decade</button>
            <button class="btn btn--quiet" data-scale="century">Century</button>
            <button class="btn btn--quiet" data-scale="millennium">Millennium</button>
            <button class="btn btn--quiet" data-scale="ten-thousand">10K Years</button>
            <button class="btn btn--quiet" data-scale="hundred-thousand">100K Years</button>
            <button class="btn btn--quiet" data-scale="million">Million Years</button>
            <button class="btn btn--quiet" data-scale="ten-million">10M Years</button>
            <button class="btn btn--quiet" data-scale="hundred-million">100M Years</button>
            <button class="btn btn--quiet" data-scale="billion">Billion Years</button>
        </div>
    </div>

    <!-- Edit / Add Modal -->
    <div id="edit-modal" class="edit-modal">
        <div class="edit-modal-content">
            <h3 class="edit-modal-title" id="edit-modal-title">Edit Item</h3>
            <label class="edit-label">Name
                <input type="text" id="edit-name" class="edit-input">
            </label>
            <div class="edit-label">Type
                <div class="segmented" id="edit-type" role="radiogroup" aria-label="Type">
                    <input class="segmented-input" type="radio" name="edit-item-type"
                           id="edit-type-duration" value="duration">
                    <label class="segmented-option" for="edit-type-duration">Duration</label>
                    <input class="segmented-input" type="radio" name="edit-item-type"
                           id="edit-type-event" value="event">
                    <label class="segmented-option" for="edit-type-event">Event</label>
                </div>
            </div>
            <label class="edit-label">Parent
                <select id="edit-parent" class="edit-input"></select>
            </label>
            <label class="edit-label">Precision
                <select id="edit-precision" class="edit-input">
                    <option value="year">Year</option>
                    <option value="month">Month</option>
                    <option value="day">Day</option>
                    <option value="datetime">Date &amp; time</option>
                </select>
            </label>
            <p class="edit-hint" id="edit-date-hint" hidden></p>
            <label class="edit-label">Start Date
                <input type="date" id="edit-start" class="edit-input">
            </label>
            <div id="edit-end-group">
                <label class="edit-label">End Date
                    <input type="date" id="edit-end" class="edit-input">
                </label>
            </div>
            <label class="edit-label">Notes
                <textarea id="edit-notes" class="edit-input edit-textarea" rows="2"></textarea>
            </label>

            <p class="edit-error" id="edit-error" role="alert" hidden></p>

            <div class="edit-modal-buttons" id="edit-main-buttons">
                <button id="edit-delete-btn" class="edit-btn edit-btn-danger-text">Delete</button>
                <span class="edit-buttons-spacer"></span>
                <button id="edit-cancel-btn" class="edit-btn edit-btn-cancel">Cancel</button>
                <button id="edit-save-btn" class="edit-btn edit-btn-save">Save</button>
            </div>

            <div class="edit-delete-confirm" id="edit-delete-confirm" hidden>
                <p class="edit-delete-warning" id="edit-delete-warning"></p>
                <label class="edit-check" id="edit-delete-children-row" hidden>
                    <input type="checkbox" id="edit-delete-children">
                    <span id="edit-delete-children-text"></span>
                </label>
                <div class="edit-modal-buttons">
                    <button id="edit-delete-cancel" class="edit-btn edit-btn-cancel">Cancel</button>
                    <button id="edit-delete-confirm-btn" class="edit-btn edit-btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
