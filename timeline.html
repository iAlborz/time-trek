<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrek - Interactive Timeline</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css?v=15">
</head>
<body class="timeline-page">
    <div class="container">
        <canvas id="timeline-canvas"></canvas>
        <div id="timeline-items" class="tl-items"></div>
        <a href="index.html" id="back-btn" class="back-button">← Projects</a>

        <input type="file" id="csv-upload" accept=".csv" style="display: none;">
        <input type="file" id="json-upload" accept=".json" style="display: none;">

        <div class="top-controls">
            <div class="data-menu" id="data-menu">
                <button id="data-menu-btn" class="data-button data-menu-trigger"
                        aria-haspopup="true" aria-expanded="false" aria-controls="data-menu-panel">
                    Data<span class="data-menu-caret" aria-hidden="true">▾</span>
                </button>
                <div class="data-menu-panel" id="data-menu-panel" role="menu">
                    <button id="upload-btn" class="data-menu-item" role="menuitem">Import CSV</button>
                    <button id="import-json-btn" class="data-menu-item" role="menuitem">Import JSON</button>
                    <button id="export-btn" class="data-menu-item" role="menuitem">Export JSON</button>
                    <button id="sample-data-btn" class="data-menu-item" role="menuitem">Load Sample Data</button>
                    <hr class="data-menu-separator">
                    <button id="clear-data-btn" class="data-menu-item data-menu-item-danger" role="menuitem">Clear Data</button>
                </div>
            </div>
            <button id="add-item-btn" class="today-button">+ Add Item</button>
            <button id="today-btn" class="today-button">Today</button>
        </div>

        <div class="scale-controls">
            <button id="fit-btn" class="scale-btn scale-btn-fit">
                <svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path d="M2.5 4v8M13.5 4v8"/>
                    <path d="M5 8h6"/>
                    <path d="M7 6 5 8l2 2"/>
                    <path d="M9 6l2 2-2 2"/>
                </svg>
                Fit All
            </button>
            <span class="scale-divider" aria-hidden="true"></span>
            <button class="scale-btn" data-scale="hour">Hour</button>
            <button class="scale-btn" data-scale="day">Day</button>
            <button class="scale-btn" data-scale="week">Week</button>
            <button class="scale-btn" data-scale="month">Month</button>
            <button class="scale-btn" data-scale="quarter">Quarter</button>
            <button class="scale-btn" data-scale="year">Year</button>
            <button class="scale-btn" data-scale="decade">Decade</button>
            <button class="scale-btn" data-scale="century">Century</button>
            <button class="scale-btn" data-scale="millennium">Millennium</button>
            <button class="scale-btn" data-scale="ten-thousand">10K Years</button>
            <button class="scale-btn" data-scale="hundred-thousand">100K Years</button>
            <button class="scale-btn" data-scale="million">Million Years</button>
            <button class="scale-btn" data-scale="ten-million">10M Years</button>
            <button class="scale-btn" data-scale="hundred-million">100M Years</button>
            <button class="scale-btn" data-scale="billion">Billion Years</button>
        </div>
    </div>

    <!-- Edit / Add Modal -->
    <div id="edit-modal" class="edit-modal">
        <div class="edit-modal-content">
            <h3 class="edit-modal-title" id="edit-modal-title">Edit Item</h3>
            <label class="edit-label">Name
                <input type="text" id="edit-name" class="edit-input">
            </label>
            <label class="edit-label">Type
                <select id="edit-type" class="edit-input">
                    <option value="duration">Duration</option>
                    <option value="event">Event</option>
                </select>
            </label>
            <label class="edit-label">Parent
                <select id="edit-parent" class="edit-input"></select>
            </label>
            <label class="edit-label">Precision
                <select id="edit-precision" class="edit-input">
                    <option value="year">Year</option>
                    <option value="month">Month</option>
                    <option value="day">Day</option>
                    <option value="datetime">Date &amp; time</option>
                </select>
            </label>
            <p class="edit-hint" id="edit-date-hint" hidden></p>
            <label class="edit-label">Start Date
                <input type="date" id="edit-start" class="edit-input">
            </label>
            <div id="edit-end-group">
                <label class="edit-label">End Date
                    <input type="date" id="edit-end" class="edit-input">
                </label>
            </div>
            <label class="edit-label">Notes
                <textarea id="edit-notes" class="edit-input edit-textarea" rows="2"></textarea>
            </label>

            <p class="edit-error" id="edit-error" role="alert" hidden></p>

            <div class="edit-modal-buttons" id="edit-main-buttons">
                <button id="edit-delete-btn" class="edit-btn edit-btn-danger-text">Delete</button>
                <span class="edit-buttons-spacer"></span>
                <button id="edit-cancel-btn" class="edit-btn edit-btn-cancel">Cancel</button>
                <button id="edit-save-btn" class="edit-btn edit-btn-save">Save</button>
            </div>

            <div class="edit-delete-confirm" id="edit-delete-confirm" hidden>
                <p class="edit-delete-warning" id="edit-delete-warning"></p>
                <label class="edit-check" id="edit-delete-children-row" hidden>
                    <input type="checkbox" id="edit-delete-children">
                    <span id="edit-delete-children-text"></span>
                </label>
                <div class="edit-modal-buttons">
                    <button id="edit-delete-cancel" class="edit-btn edit-btn-cancel">Cancel</button>
                    <button id="edit-delete-confirm-btn" class="edit-btn edit-btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
